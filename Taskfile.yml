version: "3"

tasks:
  init:
    desc: Run initial project setup
    cmds:
      - cp .env.sample .env
      - task: install
      - task: fetch-models 

  install:
    desc: Install project with dev dependencies
    cmds:
      - uv sync --extra dev

  lint:
    desc: Run ruff linter and formatter checks
    cmds:
      - uv run ruff check .
      - uv run ruff format --check .

  lint-fix:
    desc: Auto-fix lint issues and format
    cmds:
      - uv run ruff check --fix .
      - uv run ruff format .

  test:
    desc: Run unit tests (excludes evals)
    cmds:
      - uv run pytest --ignore=tests/evals -vv

  eval:
    desc: Run agent evaluation suite (golden test cases)
    cmds:
      - uv run pytest tests/evals/ -vv

  run:
    desc: Run the Gradio app locally
    cmds:
      - uv run python -m app.app

  build:
    desc: Build the package
    cmds:
      - uv build

  publish:
    desc: Publish to PyPI
    cmds:
      - uv publish

  fetch-models:
    desc: Download GGUF model files into models/ from models.ini
    deps:
      - install
    cmds:
      - uv run python tools/download-models.py

  all:
    desc: Run lint and tests
    cmds:
      - task: lint
      - task: test
      - task: eval
